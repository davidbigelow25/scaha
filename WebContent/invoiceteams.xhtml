<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:c="http://java.sun.com/jsp/jstl/core"
      xmlns:b="http://bootsfaces.net/ui">

<f:metadata>
	<f:viewParam name="clubId" value="#{invoiceTeamBean.clubId}" />
	<f:event type="preRenderView" listener="#{profileBean.hasRoleList('S-TRE')}" />
	<f:viewAction action="#{invoiceTeamBean.loadTeamInvoices}" />

</f:metadata>

<ui:composition template="/WEB-INF/templates/layoutadmin.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="content">
		<b:container>
			<b:row>
				<b:column>

					<b:form>

						<b:panel look="primary">
							<f:facet name="heading">
								<!--<h:outputText value="Team Breakdown - #{invoiceTeamBean.clubName} (#{invoiceTeamBean.year})" />-->
							</f:facet>

							<b:dataTable
									value="#{invoiceTeamBean.teams}"
									var="team"
									striped="true"
									hover="true"
									paginator="true"
									searching="true"
									border="true"
									excel="true"
									csv="true"
									pdf="true">

								<b:dataTableColumn>
									<f:facet name="header">Team</f:facet>
									#{team.teamName}
								</b:dataTableColumn>

								<b:dataTableColumn style="text-align:right">
									<f:facet name="header">Players</f:facet>
									#{team.playerCount}
								</b:dataTableColumn>

								<b:dataTableColumn style="text-align:right">
									<f:facet name="header">Total</f:facet>
									<h:outputText value="#{team.totalAmount}">
										<f:convertNumber type="currency"/>
									</h:outputText>
								</b:dataTableColumn>
								<b:dataTableColumn>
									<f:facet name="header">
										<h:outputText value="Details" />
									</f:facet>

									<b:commandButton value="View Players"
													 look="info"
													 action="#{invoiceTeamBean.viewPlayers(team.teamId)}"
													 ajax="false"/>
								</b:dataTableColumn>
							</b:dataTable>

							<p:spacer height="10"/>

							<b:panelGrid colSpans="8,4">
								<h:outputText value=" "/>
								<h:outputText value="Grand Total: #{invoiceTeamBean.grandTotal}">
									<f:convertNumber type="currency"/>
								</h:outputText>
							</b:panelGrid>

							<p:spacer height="10"/>

							<b:commandButton value="Back"
											 look="info"
											 action="invoicesummary.xhtml?faces-redirect=true"
											 ajax="false"/>

						</b:panel>

					</b:form>

				</b:column>
			</b:row>
		</b:container>
	</ui:define>
</ui:composition>
</html>
