<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:c="http://java.sun.com/jsp/jstl/core"
      xmlns:b="http://bootsfaces.net/ui">

<f:metadata>
	<f:viewParam name="teamId" value="#{invoicePlayerBean.teamId}" />
	<f:event type="preRenderView" listener="#{profileBean.hasRoleList('S-TRE')}" />
	<f:viewAction action="#{invoicePlayerBean.loadPlayers}" />

</f:metadata>

<ui:composition template="/WEB-INF/templates/layoutadmin.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="content">
		<b:container>
			<b:row>
				<b:column>

					<b:form>

						<b:panel look="primary">

							<f:facet name="heading">
								<!--<h:outputText value="Player Invoice Breakdown - #{invoicePlayerBean.teamName}" />-->
							</f:facet>

							<b:dataTable
									value="#{invoicePlayerBean.players}"
									var="player"
									striped="true"
									hover="true"
									paginator="true"
									searching="true"
									border="true"
									excel="true"
									csv="true"
									pdf="true"
									column-visibility="true">

								<b:dataTableColumn>
									<f:facet name="header">
										First Name
									</f:facet>

									#{player.firstName}
								</b:dataTableColumn>

								<b:dataTableColumn>
									<f:facet name="header">
										Last Name
									</f:facet>

									#{player.lastName}
								</b:dataTableColumn>

								<b:dataTableColumn style="text-align:right">
									<f:facet name="header">
										Invoice Fee
									</f:facet>

									<h:outputText value="#{player.invoiceFee}">
										<f:convertNumber type="currency"/>
									</h:outputText>
								</b:dataTableColumn>

								<b:dataTableColumn>
									<f:facet name="header">
										Added Date
									</f:facet>

									<h:outputText value="#{player.addedDate}">
										<f:convertDateTime pattern="MM/dd/yyyy"/>
									</h:outputText>
								</b:dataTableColumn>

							</b:dataTable>

							<p:spacer height="10"/>

							<b:panelGrid colSpans="8,4">

								<h:outputText value=" " />

								<h:outputText
										value="Grand Total: #{invoicePlayerBean.grandTotal}">

									<f:convertNumber type="currency"/>

								</h:outputText>

							</b:panelGrid>

							<p:spacer height="10"/>

							<b:commandButton value="Back"
											 look="info"
											 action="invoiceTeams.xhtml?faces-redirect=true"
											 ajax="false"/>

						</b:panel>

					</b:form>

				</b:column>
			</b:row>

		</b:container>
	</ui:define>
</ui:composition>
</html>
