<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:c="http://java.sun.com/jsp/jstl/core"
      xmlns:b="http://bootsfaces.net/ui">

<f:metadata>
	<f:event type="preRenderView" listener="#{profileBean.hasRoleList('S-TRE')}" />
</f:metadata>

<ui:composition template="/WEB-INF/templates/layoutadmin.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<ui:define name="content">
	<b:container>
		<b:row>
			<b:column>
				<b:form id="form">
					<b:panel id="panel" collapsible="false" look="primary">
						<f:facet name="heading">
							<h:outputText value="League Invoicing Summary" />
						</f:facet>

						<!-- Filters -->
						<b:panelGrid colSpans="2,2,8" style="padding: 5;">
							<h:outputText style="font-weight: bold;" value="Season Year: #{invoiceBean.year}"/>
						</b:panelGrid>

						<!-- Invoice Table -->
						<b:dataTable
								id="invoiceTable"
								var="inv"
								value="#{invoiceBean.invoices}"
								striped="true"
								hover="true"
								responsive="true"
								paginator="true"
								searching="true"
								border="true"
								excel="true"
								csv="true"
								pdf="true"
								column-visibility="true">

							<b:dataTableColumn>
								<f:facet name="header">
									Club
								</f:facet>
								<h:outputText value="#{inv.clubName}" />
							</b:dataTableColumn>

							<b:dataTableColumn style="text-align:right">
								<f:facet name="header">
									Players
								</f:facet>
								<h:outputText value="#{inv.playerCount}" />
							</b:dataTableColumn>

							<b:dataTableColumn style="text-align:right">
								<f:facet name="header">
									Price / Player
								</f:facet>
								<h:outputText value="#{inv.pricePerPlayer}">
									<f:convertNumber type="currency"/>
								</h:outputText>
							</b:dataTableColumn>

							<b:dataTableColumn style="text-align:right">
								<f:facet name="header">
									Total Owed
								</f:facet>
								<h:outputText value="#{inv.totalAmount}">
									<f:convertNumber type="currency"/>
								</h:outputText>
							</b:dataTableColumn>
							<b:dataTableColumn>
								<f:facet name="header">
									<h:outputText value="Details" />
								</f:facet>

								<b:commandButton value="View Teams"
												 look="info"
												 action="#{invoiceBean.viewTeams(inv.clubId)}"
												 ajax="false"/>
							</b:dataTableColumn>
						</b:dataTable>

						<p:spacer width="10" height="10" />

						<!-- Footer / Totals -->
						<b:panelGrid colSpans="8,4">
							<h:outputText value=" " />

							<h:outputText style="font-weight:bold; font-size:16px;"
										  value="Grand Total: #{invoiceBean.grandTotal}">
								<f:convertNumber type="currency"/>
							</h:outputText>
						</b:panelGrid>

						<p:spacer width="10" height="10" />

						<!-- Actions -->
						<b:panelGrid colSpans="3,2,2,2,3">
							<h:outputText value=" "/>
							<h:outputText value=" "/>

							<b:commandButton value="Refresh"
											 look="primary"
											 action="#{invoiceBean.loadInvoices}"
											 update="invoiceTable"
											 large-screen="full-width"
											 medium-screen="full-width"
											 small-screen="full-width"
											 tiny-screen="full-width"/>

							<b:commandButton value="Close"
											 look="info"
											 ajax="false"
											 actionListener="#{invoiceBean.closePage()}"
											 large-screen="full-width"
											 medium-screen="full-width"
											 small-screen="full-width"
											 tiny-screen="full-width"/>

							<h:outputText value=" "/>
						</b:panelGrid>

					</b:panel>

				</b:form>
			</b:column>
		</b:row>
	</b:container>
</ui:define>
</ui:composition>
</html>
